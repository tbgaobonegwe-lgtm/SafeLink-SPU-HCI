<!DOCTYPE html>
<html>
    <div style="background-color: #0056b3; color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.2); font-family: 'Segoe UI', sans-serif;">
    <h2 style="margin: 0; font-size: 20px; letter-spacing: 1px;">🛡️ SafeLink</h2>
    <span style="font-size: 12px; opacity: 0.8;">Kimberley Community</span>
</div>

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body bgcolor="#f8f9fa" class="bg-light">
    <div class="container mt-5" style="max-width: 400px;">
        <div class="card p-4 shadow">
            <h2 class="text-center mb-4">SafeLink Login</h2>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary w-100 mt-3">LOGIN</button>
            </form>
            <p class="mt-3 text-center">Don't have an account? <a href="{% url 'signup' %}">SIGN UP</a></p>
        </div>
    </div>
</body>
</html>
